services:
  app:
    build: .
    restart: unless-stopped
    environment:
      KYDIR_COOKIE_SECURE: ${KYDIR_COOKIE_SECURE:-1}
      KYDIR_SESSION_TTL_DAYS: ${KYDIR_SESSION_TTL_DAYS:-30}
    volumes:
      - ./data:/app/data          # база SQLite живёт на хосте — переживает пересборку
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
